<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अल्ट्रा हाई-टेक प्रो लाइव स्टॉक टर्मिनल</title>
    <style>
        /* डार्क हाई-टेक टर्मिनल थीम */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0c0f16;
            color: #ffffff;
            overflow-x: hidden;
        }
        header {
            background-color: #131722;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #2a2e39;
        }
        h1 { margin: 0; color: #2962ff; font-size: 20px; letter-spacing: 1px; }
        
        /* नया जोड़ा गया लाइव टिकर बैंड स्टाइल */
        .ticker-tape-container {
            width: 100%;
            background-color: #131722;
            border-bottom: 2px solid #2962ff;
            height: 40px;
            overflow: hidden;
        }

        .search-container {
            text-align: center;
            margin: 15px 0;
        }
        input[type="text"] {
            padding: 10px;
            width: 220px;
            border: 1px solid #2a2e39;
            border-radius: 4px;
            background-color: #1e222d;
            color: white;
            font-size: 15px;
            text-transform: uppercase;
        }
        button {
            padding: 10px 20px;
            background-color: #2962ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }
        button:hover { background-color: #1e4bd8; }

        /* 3-कॉलम हाई-टेक लेआउट (टिकर बैंड की ऊंचाई घटाकर एडजस्ट किया गया) */
        .main-grid {
            display: grid;
            grid-template-columns: 310px 1fr 310px;
            gap: 15px;
            padding: 0 15px 15px 15px;
            height: calc(100vh - 165px);
            box-sizing: border-box;
        }

        .panel {
            background-color: #131722;
            border-radius: 6px;
            border: 1px solid #2a2e39;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            background-color: #1c2030;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #b2b5be;
            border-bottom: 2px solid #2a2e39;
            text-align: center;
        }
        
        .widget-container {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .center-area { display: flex; flex-direction: column; gap: 15px; }
        .chart-box {
            flex: 1;
            background-color: #131722;
            border-radius: 6px;
            border: 1px solid #2a2e39;
            padding: 10px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0c0f16; }
        ::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- 1. सबसे ऊपर लाइव रनिंग इंडेक्स टिकर बैंड (Nifty, BankNifty, Sensex) -->
    <div class="ticker-tape-container" id="liveTickerTape">
        <!-- TradingView टिकर टेप विजेट कोडिंग द्वारा यहाँ लोड होगा -->
    </div>

    <header>
        <h1>⚡ क्वांटम हाई-टेक स्टॉक टर्मिनल (इंडेक्स टिकर अपडेटेड)</h1>
    </header>

    <div class="search-container">
        <input type="text" id="tickerInput" value="NSE:RELIANCE" placeholder="उदा: NSE:SBIN, NSE:NIFTY, AAPL">
        <button onclick="analyzeStock()">लाइव चार्ट बदलें</button>
    </div>

    <div class="main-grid">
        
        <!-- [LEFT SIDEBAR]: लाइव टॉप मूवर्स स्कैनर -->
        <div class="panel">
            <div class="panel-header">📈 लाइव टॉप मूवर्स (> ±2% स्कैन)</div>
            <div class="widget-container" id="gainerWidget"></div>
        </div>

        <!-- [CENTER AREA]: वास्तविक रीयल-टाइम लाइव चार्ट -->
        <div class="center-area">
            <div class="chart-box">
                <div id="tradingview_chart" style="height: 100%;"></div>
            </div>
        </div>

        <!-- [RIGHT SIDEBAR]: लाइव वॉल्यूम और मोस्ट एक्टिव स्कैनर -->
        <div class="panel">
            <div class="panel-header">🔥 लाइव वॉल्यूम और मोस्ट एक्टिव स्कैनर</div>
            <div class="widget-container" id="oiWidget"></div>
        </div>

    </div>

    <!-- TradingView मुख्य कोडिंग लाइब्रेरी स्क्रिप्ट -->
    <script type="text/javascript" src="https://tradingview.com"></script>

    <script>
        window.onload = function() {
            loadTickerTape();     // सबसे ऊपर चलने वाला लाइव टिकर लोड करें
            analyzeStock();        // मुख्य लाइव चार्ट लोड करें
            loadLiveScanners();   // दोनों तरफ के लाइव डेटा स्कैनर लोड करें
        };

        // 2. सबसे ऊपर रनिंग टिकर बैंड लोड करने की कोडिंग
        function loadTickerTape() {
            document.getElementById('liveTickerTape').innerHTML = "";
            let tapeScript = document.createElement('script');
            tapeScript.type = 'text/javascript';
            tapeScript.src = 'https://tradingview.com';
            tapeScript.async = true;
            tapeScript.text = JSON.stringify({
                "symbols": [
                    { "proName": "BSE:SENSEX", "title": "SENSEX" },
                    { "proName": "NSE:NIFTY", "title": "NIFTY 50" },
                    { "proName": "NSE:BANKNIFTY", "title": "BANK NIFTY" },
                    { "proName": "BSE:MIDCAP", "title": "BSE MIDCAP" },
                    { "proName": "BSE:SMALLCAP", "title": "BSE SMALLCAP" }
                ],
                "showSymbolLogo": true,
                "colorTheme": "dark",
                "isTransparent": false,
                "displayMode": "adaptive",
                "locale": "in"
            });
            document.getElementById('liveTickerTape').appendChild(tapeScript);
        }

        // 3. लाइव एडवांस्ड कैंडलस्टिक चार्ट कोडिंग
        function analyzeStock() {
            let symbol = document.getElementById('tickerInput').value.trim().toUpperCase();
            
            if (!symbol.includes(":")) {
                symbol = "NSE:" + symbol;
            }

            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "5", 
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1", 
                "locale": "in",
                "enable_publishing": false,
                "hide_side_toolbar": false, 
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
        }

        // 4. साइडबार्स में असली लाइव डेटा फीड लोड करने की कोडिंग
        function loadLiveScanners() {
            // [LEFT SIDEBAR]: लाइव गेनर्स/लूज़र्स ऑटो-स्कैनर
            document.getElementById('gainerWidget').innerHTML = "";
            let gainerScript = document.createElement('script');
            gainerScript.type = 'text/javascript';
            gainerScript.src = 'https://tradingview.com';
            gainerScript.async = true;
            gainerScript.text = JSON.stringify({
                "colorTheme": "dark",
                "dateRange": "12M",
                "exchange": "NSE",
                "showValues": true,
                "screenMode": "new_highs_lows", 
                "width": "100%",
                "height": "100%",
                "locale": "in"
            });
            document.getElementById('gainerWidget').appendChild(gainerScript);

            // [RIGHT SIDEBAR]: लाइव वॉल्यूम और मोस्ट एक्टिव स्कैनर
            document.getElementById('oiWidget').innerHTML = "";
            let oiScript = document.createElement('script');
            oiScript.type = 'text/javascript';
            oiScript.src = 'https://tradingview.com';
            oiScript.async = true;
            oiScript.text = JSON.stringify({
                "colorTheme": "dark",
                "dateRange": "12M",
                "exchange": "NSE",
                "showValues": true,
                "screenMode": "most_active", 
                "width": "100%",
                "height": "100%",
                "locale": "in"
            });
            document.getElementById('oiWidget').appendChild(oiScript);
        }
    </script>
</body>
</html>
